openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: NyayAI - Indian Legal Assistant API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: conversations
    description: AI legal chat conversations
  - name: legal
    description: Legal document operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /conversations:
    get:
      operationId: listConversations
      tags: [conversations]
      summary: List all conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Conversation"
    post:
      operationId: createConversation
      tags: [conversations]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConversationInput"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"

  /conversations/{id}:
    get:
      operationId: getConversation
      tags: [conversations]
      summary: Get conversation with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: deleteConversation
      tags: [conversations]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /conversations/{id}/messages:
    get:
      operationId: listMessages
      tags: [conversations]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
    post:
      operationId: sendMessage
      tags: [conversations]
      summary: Send a message and receive a streaming AI response
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageInput"
      responses:
        "200":
          description: SSE stream of assistant text chunks
          content:
            text/event-stream: {}

  /legal/document-types:
    get:
      operationId: listDocumentTypes
      tags: [legal]
      summary: List available legal document types
      responses:
        "200":
          description: List of document types
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DocumentType"

  /legal/explain:
    post:
      operationId: explainDocument
      tags: [legal]
      summary: Explain a legal document in plain language
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExplainInput"
      responses:
        "200":
          description: SSE stream of explanation
          content:
            text/event-stream: {}

  /legal/documents:
    get:
      operationId: listDocuments
      tags: [legal]
      summary: List all generated legal documents
      responses:
        "200":
          description: List of documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LegalDocument"
    post:
      operationId: createDocument
      tags: [legal]
      summary: Create a legal document from provided details
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DocumentInput"
      responses:
        "200":
          description: SSE stream of generated document
          content:
            text/event-stream: {}

  /legal/documents/{id}:
    get:
      operationId: getDocument
      tags: [legal]
      summary: Get a legal document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Legal document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LegalDocument"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: deleteDocument
      tags: [legal]
      summary: Delete a legal document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /legal/stats:
    get:
      operationId: getLegalStats
      tags: [legal]
      summary: Get usage statistics
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LegalStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Conversation:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        topic:
          type: ["string", "null"]
        messageCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - messageCount
        - createdAt
        - updatedAt

    ConversationInput:
      type: object
      properties:
        title:
          type: string
        topic:
          type: string
      required:
        - title

    ConversationWithMessages:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        topic:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        messages:
          type: array
          items:
            $ref: "#/components/schemas/Message"
      required:
        - id
        - title
        - messages
        - createdAt
        - updatedAt

    Message:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - conversationId
        - role
        - content
        - createdAt

    MessageInput:
      type: object
      properties:
        content:
          type: string
      required:
        - content

    DocumentType:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        fields:
          type: array
          items:
            $ref: "#/components/schemas/DocumentField"
      required:
        - id
        - name
        - description
        - fields

    DocumentField:
      type: object
      properties:
        name:
          type: string
        label:
          type: string
        type:
          type: string
        required:
          type: boolean
        placeholder:
          type: string
      required:
        - name
        - label
        - type
        - required

    ExplainInput:
      type: object
      properties:
        text:
          type: string
        language:
          type: string
          description: Preferred response language (e.g. en, hi, ta)
      required:
        - text

    LegalDocument:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        documentType:
          type: string
        content:
          type: string
        fields:
          type: string
          description: JSON-encoded field values used to generate this document
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - documentType
        - content
        - createdAt

    DocumentInput:
      type: object
      properties:
        documentType:
          type: string
        title:
          type: string
        fields:
          type: object
          additionalProperties: true
      required:
        - documentType
        - title
        - fields

    LegalStats:
      type: object
      properties:
        totalConversations:
          type: integer
        totalMessages:
          type: integer
        totalDocuments:
          type: integer
      required:
        - totalConversations
        - totalMessages
        - totalDocuments

    ApiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
