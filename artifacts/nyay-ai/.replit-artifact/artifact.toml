kind = "web"
previewPath = "/"
title = "NyayAI - Legal Assistant"
version = "1.0.0"
id = "artifacts/nyay-ai"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20613

[services.development]
run = "pnpm --filter @workspace/nyay-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nyay-ai", "run", "build" ]
serve = "static"
publicDir = "artifacts/nyay-ai/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20613"
BASE_PATH = "/"
